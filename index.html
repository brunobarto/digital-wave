<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Matrix Blue ASCII Wave</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #02040a;
    color: #4fd5ff;
    font-family: "Courier New", monospace;
    height: 100%;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
<canvas id="wave"></canvas>
<script>
  const canvas = document.getElementById("wave");
  const ctx = canvas.getContext("2d");

  let width, height, cols, rows, cellSize;
  let time = 0;

  const chars = ["~", "≈", "≋", "░", "▒", "▓", "█"];
  const bgColor = "#02040a";
  const waterColor = "#3fd0ff";
  const foamColor = "#e6f7ff";

  let mouseX = null;
  let mouseY = null;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    width = canvas.width;
    height = canvas.height;

    // cell size controls ASCII density
    cellSize = Math.max(10, Math.min(width, height) / 60);
    cols = Math.floor(width / cellSize);
    rows = Math.floor(height / cellSize);
  }

  window.addEventListener("resize", resize);
  resize();

  canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
  });

  canvas.addEventListener("mouseleave", () => {
    mouseX = null;
    mouseY = null;
  });

  function draw() {
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, width, height);

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `${cellSize * 0.9}px "Courier New", monospace`;

    time += 0.02;

    for (let x = 0; x < cols; x++) {
      const worldX = x * cellSize + cellSize / 2;

      // base wave height (big curling wave)
      const baseWave =
        0.35 * height +
        Math.sin((x / cols) * Math.PI * 2 - time * 0.8) * 0.18 * height +
        Math.pow(Math.max(0, 1 - x / cols), 2.5) * 0.35 * height;

      for (let y = 0; y < rows; y++) {
        const worldY = y * cellSize + cellSize / 2;

        // distance from mouse for local disturbance
        let disturbance = 0;
        if (mouseX !== null && mouseY !== null) {
          const dx = worldX - mouseX;
          const dy = worldY - mouseY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const radius = Math.min(width, height) * 0.25;
          if (dist < radius) {
            const influence = (1 - dist / radius);
            disturbance =
              Math.sin(time * 4 + dist * 0.08) * influence * cellSize * 2.5;
          }
        }

        const waveLine = baseWave + disturbance;

        // only draw "water" cells below the wave line
        if (worldY >= waveLine) {
          // depth factor: deeper = darker, closer to surface = brighter
          const depth = Math.min(1, (worldY - waveLine) / (0.4 * height));
          const foamFactor = Math.max(
            0,
            1 - (worldY - waveLine) / (cellSize * 2)
          );

          // choose character based on depth and some noise
          const noise =
            Math.sin(x * 0.7 + y * 1.3 + time * 1.5) * 0.5 +
            Math.cos(x * 1.1 - y * 0.9 + time * 0.7) * 0.5;
          const charIndex = Math.floor(
            Math.min(chars.length - 1, Math.max(0, (1 - depth) * chars.length + noise))
          );
          const ch = chars[charIndex];

          // color blend: foam near crest, matrix-blue deeper
          let r, g, b;
          if (foamFactor > 0.6) {
            // foam
            r = 230;
            g = 247;
            b = 255;
          } else {
            // water: matrix blue
            const baseR = 10, baseG = 180, baseB = 255;
            const deepR = 0, deepG = 40, deepB = 80;
            const t = depth;
            r = deepR * t + baseR * (1 - t);
            g = deepG * t + baseG * (1 - t);
            b = deepB * t + baseB * (1 - t);
          }

          // subtle flicker for matrix feel
          const flicker = 0.85 + Math.random() * 0.15;
          r *= flicker;
          g *= flicker;
          b *= flicker;

          ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
          ctx.fillText(ch, worldX, worldY);
        }
      }
    }

    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
